
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Graphviz Toggle</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hpcc-js/wasm@2.20.0/dist/graphviz.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-graphviz@5.6.0/build/d3-graphviz.js"></script>
    <style>#graph { cursor: pointer; }</style>
</head>
<body>
    <div id="graph" style="text-align: center;"></div>
    <script>
        const dotOff = `digraph G{
  rankdir=TB;
  node [shape=box, style=filled, fontname="Arial"];
  graph[
    label="google_maps"
  ];
  user [label="Google Maps User" shape=box];
  user -> google_maps_system [label="Searches for places, navigation" arrowhead=open ];
  google_maps_system [label="Google Maps System" shape=box];
  google_maps_system -> gps_services [label="Fetches GPS Data" arrowhead=open ];
  google_maps_system -> traffic_data_providers [label="Retrieves Traffic Updates" arrowhead=open ];
  google_maps_system -> weather_api [label="Fetches Weather Data" arrowhead=open ];
  gps_services [label="GPS Services" shape=box];
  traffic_data_providers [label="Traffic Data Providers" shape=box];
  weather_api [label="Weather API" shape=box];
}
`;
        const dotOn = `digraph G{
  rankdir=TB;
  node [shape=box, style=filled, fontname="Arial"];
  graph[
    label="google_maps"
  ];
  user [label="Google Maps User" shape=box];
  user -> frontend [label="Interacts via UI" arrowhead=open ];
  subgraph cluster_google_maps_system {
    label="Google Maps System";
    style=dashed;
    frontend [label="Frontend (Web & Mobile)" shape=box];
    api_gateway [label="API Gateway" shape=box];
    map_rendering [label="Map Rendering Service" shape=box];
    routing [label="Routing Service" shape=box];
    traffic [label="Traffic Analysis Services" shape=box];
    database [label="Database" shape=box];
    cache [label="In-Memory Cache" shape=box];
  }
  frontend -> api_gateway [label="Sends Requests" arrowhead=open ];
  api_gateway -> map_rendering [label="Feteches map tiles" arrowhead=open ];
  api_gateway -> routing [label="Calculates routes" arrowhead=open ];
  api_gateway -> traffic [label="Fetches traffic data" arrowhead=open ];
  map_rendering -> gps_services [label="gets location" arrowhead=open  style=dotted ];
  routing -> database [label="Reads/Writes" arrowhead=open ];
  traffic -> cache [label="Uses" arrowhead=open ];
  traffic -> traffic_data_providers [label="Uses" arrowhead=open  style=dotted ];
  gps_services [label="GPS Services" shape=box];
  traffic_data_providers [label="Traffic Data Providers" shape=box];
  weather_api [label="Weather API" shape=box];
}
`;
        let isEnabled = false;

        const graphviz = d3.select("#graph")
			.graphviz()
			.fit(true)
			.width(window.innerWidth)
			.height(window.innerHeight)
			.zoom(true);

        function render() {
            graphviz.renderDot(isEnabled ? dotOn : dotOff);
        }

        
        d3.select("#graph").on("click", () => {
            isEnabled = !isEnabled;
            render();
        });

        render();
    </script>
</body>
</html>
