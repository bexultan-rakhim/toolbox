context: banking_system

systems:
  - id: person
    name: Personal Banking Customer
    kind: actor
    external: true
    links:
      - target: internet_banking_system
        description: Views account balances and makes payments using
      - target: static_content
        description: Loads the UI from
      - target: ui
        description: Views account balances and makes payments using

  - id: internet_banking_system
    name: Internet Banking System
    description: Allows customer to view information about their bank accounts and make payments via the web
    links:
      - target: amazon_web_services
        description: Sends e-mails to customers using
      - target: core_banking_system
        description: Gets bank account information and makes payments using
    containers:
      - id: ui
        name: UI
        description: Single-page app that provides Internet banking functionality to customers via thier web browser 
        technology: [JavaScript, Angular]
        links:
          - target: backend
            description: Makes API request to 
            technology: [JSON, HTTP]
      - id: static_content
        name: Static Content
        technology: [HTML, CSS, JavaScript, etc. ]
        links:
          - target: ui
            description: Delivers

      - id: backend
        name: Backend
        description: Provides Internet Banking functionality via a JSON/HTTP API.
        technology: [Java, Spring Boot]
        links:
          - target: core_banking_system
            description: Makes API  requests to 
            technology: [XML, HTTPS]
          - target: amazon_web_services
            description: Sends e-mails to customers using
            technology: [AWS SES API, HTTP]
          - target: statement_store
            description: Reads from and writes to
            technology: [AWS S3 API, HTTP]
          - target: database
            description: Reads from and writes to
            technology:  MySQL protocol
      - id: statement_store
        name: Statement Store
        description: Bank Account Statments rendered as PDF files.
        technology: AWS S3

      - id: database
        name: Database
        description: User account information, access logs, etc.
        technology: [MySQL, DBSchema] 

  - id: core_banking_system
    name: Core Banking System
    description: Handles core banking functions including ifnromation, bank account management, transactions, etc.
    external: true

  - id: amazon_web_services
    name: Amazon Web Services Simple Email Service
    description: Cloud-based email service provider
    external: true
    links:
      - target: person
        description: Sends e-mails to
